<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Sản Phẩm Chợ Tết</title>
  </head>

  <body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <input type="text" id="search-input" placeholder="Tìm sản phẩm..." />

    <ul id="product-list"></ul>

    <form id="product-form">
      <input
        type="text"
        id="product-name"
        placeholder="Tên sản phẩm"
        required
      />
      <input
        type="number"
        id="product-price"
        placeholder="Giá (VND)"
        required
      />
      <br />
      <button type="submit">Thêm Sản Phẩm</button>
    </form>

    <script src="Bai5.js"></script>
  </body>
</html>
